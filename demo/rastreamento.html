<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideFlow - Rastreamento da Corrida</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="tracking-layout">

    <!-- Full-screen Map Background -->
    <div class="tracking-map">
      <div class="map-grid"></div>

      <!-- Horizontal Roads -->
      <div class="map-road-h" style="top: 30%; left: 10%; width: 80%;"></div>
      <div class="map-road-h" style="top: 55%; left: 20%; width: 60%;"></div>
      <div class="map-road-h" style="top: 75%; left: 5%; width: 90%;"></div>

      <!-- Vertical Roads -->
      <div class="map-road-v" style="left: 25%; top: 15%; height: 70%;"></div>
      <div class="map-road-v" style="left: 50%; top: 10%; height: 80%;"></div>
      <div class="map-road-v" style="left: 75%; top: 20%; height: 60%;"></div>

      <!-- Pickup Marker -->
      <div class="map-marker" style="left: 20%; top: 35%;">
        <div class="map-marker-dot green"></div>
        <span class="map-marker-label">Copacabana Beach</span>
      </div>

      <!-- Dropoff Marker -->
      <div class="map-marker" style="left: 72%; top: 60%;">
        <div class="map-marker-dot orange"></div>
        <span class="map-marker-label">Cristo Redentor</span>
      </div>

      <!-- SVG Dashed Route Path -->
      <svg class="map-route" style="position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none;">
        <path d="M 21% 36% Q 35% 28%, 50% 42% T 73% 61%"
              stroke="none" fill="none" />
        <path d="M 210 360 Q 350 280, 500 420 T 730 610"
              stroke="none" fill="none" />
        <line x1="0" y1="0" x2="0" y2="0" stroke="none" />
      </svg>
      <svg class="map-route" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;" viewBox="0 0 1000 1000" preserveAspectRatio="none">
        <path d="M 220 365 C 300 320, 380 300, 450 380 S 600 500, 735 610"
              stroke="#0D1B2A" stroke-width="3" stroke-dasharray="12 8" fill="none" opacity="0.4" stroke-linecap="round" />
      </svg>

      <!-- Map Cars along the route -->
      <div class="map-car" style="left: 38%; top: 33%;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 17h2m10 0h2M5 11l1.5-4.5A2 2 0 0 1 8.4 5h7.2a2 2 0 0 1 1.9 1.5L19 11"/>
          <path d="M3 17h18v-4a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4z"/>
          <circle cx="7.5" cy="17" r="1.5"/><circle cx="16.5" cy="17" r="1.5"/>
        </svg>
      </div>
      <div class="map-car" style="left: 58%; top: 48%;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 17h2m10 0h2M5 11l1.5-4.5A2 2 0 0 1 8.4 5h7.2a2 2 0 0 1 1.9 1.5L19 11"/>
          <path d="M3 17h18v-4a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4z"/>
          <circle cx="7.5" cy="17" r="1.5"/><circle cx="16.5" cy="17" r="1.5"/>
        </svg>
      </div>
    </div>

    <!-- Top Bar -->
    <div class="tracking-topbar">
      <!-- Left: Back Button -->
      <a href="#" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Voltar
      </a>

      <!-- Center: Title -->
      <div class="tracking-topbar-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="3 11 22 2 13 21 11 13 3 11"/>
        </svg>
        Acompanhando sua Corrida
      </div>

      <!-- Right: SOS Button -->
      <button class="btn-sos">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        SOS
      </button>
    </div>

    <!-- Bottom Slide-Up Panel -->
    <div class="tracking-panel">
      <!-- Handle -->
      <div class="tracking-handle"></div>

      <!-- Status Row -->
      <div class="tracking-status">
        <div class="tracking-status-label">
          <span class="pulse-dot" style="width: 10px; height: 10px; border-radius: 50%; background: var(--secondary); display: inline-block; animation: pulse 1.5s ease-in-out infinite;"></span>
          Em Andamento
        </div>
        <div class="tracking-eta">~13 min restantes</div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-bar">
        <div class="progress-fill" style="width: 45%;"></div>
      </div>

      <!-- Driver Card -->
      <div class="tracking-driver">
        <div class="driver-avatar">RL</div>
        <div class="tracking-driver-info">
          <div class="tracking-driver-name">Roberto Lima</div>
          <div class="driver-rating" style="justify-content: flex-start; margin: 4px 0;">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <span>4.7</span>
          </div>
          <div class="tracking-driver-vehicle">Hyundai Tucson - Branco</div>
          <div style="font-size: 11px; color: var(--text-light); font-weight: 600; margin-top: 2px;">GHI-9012</div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="tracking-actions">
        <button class="btn-outline">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          Ligar
        </button>
        <button class="btn-outline">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          Compartilhar
        </button>
        <button class="btn-accent" style="font-size: 12px; padding: 8px 14px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          Cancelar
        </button>
      </div>

      <!-- Route Section -->
      <div class="tracking-route">
        <!-- Pickup -->
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 6px;">
          <div class="route-dot pickup"></div>
          <span style="font-size: 13px; color: var(--primary); font-weight: 500;">Av. Atlantica, 2000 - Copacabana</span>
        </div>

        <!-- Connector Line -->
        <div class="ride-input-connector" style="margin-left: 3px; margin-bottom: 6px;"></div>

        <!-- Dropoff -->
        <div style="display: flex; align-items: center; gap: 10px;">
          <div class="route-dot dropoff"></div>
          <span style="font-size: 13px; color: var(--primary); font-weight: 500;">Rua Cosme Velho, 513 - Cristo Redentor</span>
        </div>
      </div>

      <!-- Fare -->
      <div class="tracking-fare">
        <span class="tracking-fare-label">Tarifa Estimada</span>
        <span class="tracking-fare-value">R$ 35.00</span>
      </div>
    </div>

  </div>
</body>
</html>
